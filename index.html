<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VNMAX</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="logo.png" alt="VNMAX">
        </div>

        <div id="auth-section" class="card">
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="seu@email.com">
            </div>

            <div class="input-group">
                <label for="password">Senha</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>

            <div id="auth-message" class="message"></div>

            <div class="buttons">
                <button id="login-btn" class="btn btn-primary">Entrar</button>
                <button id="register-btn" class="btn btn-secondary">Cadastrar</button>
            </div>
        </div>

        <div id="user-section" class="card hidden">
            <div class="user-avatar">
                <img src="logo.png" alt="VNMAX">
            </div>
            <div class="welcome-text">Bem-vindo</div>
            <p id="user-email" class="user-email"></p>
            <div class="status">
                <span class="status-dot"></span>
                Online
            </div>
            <button id="logout-btn" class="btn btn-danger">Sair</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDPgiG3xbyo4P3qbLzRqZrlANGxifmwrzw",
            authDomain: "vnmax-6a660.firebaseapp.com",
            projectId: "vnmax-6a660",
            storageBucket: "vnmax-6a660.firebasestorage.app",
            messagingSenderId: "795631747302",
            appId: "1:795631747302:web:bc40546368f9f80c447b27",
            measurementId: "G-NVNP64WTYX"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const authSection = document.getElementById('auth-section');
        const userSection = document.getElementById('user-section');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('login-btn');
        const registerBtn = document.getElementById('register-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const authMessage = document.getElementById('auth-message');
        const userEmailSpan = document.getElementById('user-email');

        function showMessage(text, type) {
            authMessage.textContent = text;
            authMessage.className = `message ${type} show`;
            setTimeout(() => {
                authMessage.className = 'message';
                authMessage.textContent = '';
            }, 4000);
        }

        loginBtn.addEventListener('click', async () => {
            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                showMessage('Preencha todos os campos', 'error');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = '...';

            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                const errorMessages = {
                    'auth/user-not-found': 'Usuário não encontrado',
                    'auth/wrong-password': 'Senha incorreta',
                    'auth/invalid-credential': 'Credenciais inválidas'
                };
                showMessage(errorMessages[error.code] || 'Erro ao fazer login', 'error');
            }

            loginBtn.disabled = false;
            loginBtn.textContent = 'Entrar';
        });

        registerBtn.addEventListener('click', async () => {
            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                showMessage('Preencha todos os campos', 'error');
                return;
            }

            if (password.length < 6) {
                showMessage('A senha deve ter no mínimo 6 caracteres', 'error');
                return;
            }

            registerBtn.disabled = true;
            registerBtn.textContent = '...';

            try {
                await createUserWithEmailAndPassword(auth, email, password);
                showMessage('Usuário cadastrado com sucesso', 'success');
            } catch (error) {
                const errorMessages = {
                    'auth/email-already-in-use': 'Este email já está cadastrado',
                    'auth/invalid-email': 'Email inválido'
                };
                showMessage(errorMessages[error.code] || 'Erro ao cadastrar', 'error');
            }

            registerBtn.disabled = false;
            registerBtn.textContent = 'Cadastrar';
        });

        logoutBtn.addEventListener('click', async () => {
            await signOut(auth);
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                authSection.classList.add('hidden');
                userSection.classList.remove('hidden');
                userEmailSpan.textContent = user.email;
            } else {
                authSection.classList.remove('hidden');
                userSection.classList.add('hidden');
                emailInput.value = '';
                passwordInput.value = '';
            }
        });
    </script>
</body>
</html>
