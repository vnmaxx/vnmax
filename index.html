<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VNMAX</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="logo.png" alt="VNMAX">
        </div>

        <div id="auth-section" class="card">
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="email@exemplo.com">
            </div>
            <div class="input-group">
                <label>Senha</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
            <div id="message" class="message"></div>
            <div class="buttons">
                <button id="login" class="btn btn-primary">Entrar</button>
                <button id="register" class="btn btn-secondary">Cadastrar</button>
            </div>
        </div>

        <div id="user-section" class="card hidden">
            <div class="user-avatar">
                <img src="logo.png" alt="VNMAX">
            </div>
            <div class="welcome">Bem-vindo</div>
            <p id="user-email" class="user-email"></p>
            <div class="status">
                <span class="status-dot"></span>
                Online
            </div>
            <button id="logout" class="btn btn-danger">Sair</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

        const app = initializeApp({
            apiKey: "AIzaSyDPgiG3xbyo4P3qbLzRqZrlANGxifmwrzw",
            authDomain: "vnmax-6a660.firebaseapp.com",
            projectId: "vnmax-6a660",
            storageBucket: "vnmax-6a660.firebasestorage.app",
            messagingSenderId: "795631747302",
            appId: "1:795631747302:web:bc40546368f9f80c447b27"
        });

        const auth = getAuth(app);
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('login');
        const registerBtn = document.getElementById('register');
        const logoutBtn = document.getElementById('logout');
        const messageEl = document.getElementById('message');
        const authSection = document.getElementById('auth-section');
        const userSection = document.getElementById('user-section');
        const userEmailEl = document.getElementById('user-email');

        function showMessage(text, type) {
            messageEl.textContent = text;
            messageEl.className = `message ${type} show`;
            setTimeout(() => {
                messageEl.className = 'message';
            }, 3000);
        }

        loginBtn.onclick = async () => {
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            
            if (!email || !password) {
                showMessage('Preencha todos os campos', 'error');
                return;
            }

            loginBtn.textContent = '...';
            loginBtn.disabled = true;

            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                const errors = {
                    'auth/user-not-found': 'Usuário não encontrado',
                    'auth/wrong-password': 'Senha incorreta',
                    'auth/invalid-credential': 'Email ou senha inválidos'
                };
                showMessage(errors[error.code] || 'Erro ao entrar', 'error');
            }

            loginBtn.textContent = 'Entrar';
            loginBtn.disabled = false;
        };

        registerBtn.onclick = async () => {
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            
            if (!email || !password) {
                showMessage('Preencha todos os campos', 'error');
                return;
            }

            if (password.length < 6) {
                showMessage('Senha mínimo 6 caracteres', 'error');
                return;
            }

            registerBtn.textContent = '...';
            registerBtn.disabled = true;

            try {
                await createUserWithEmailAndPassword(auth, email, password);
                showMessage('Cadastrado com sucesso', 'success');
            } catch (error) {
                const errors = {
                    'auth/email-already-in-use': 'Email já cadastrado',
                    'auth/invalid-email': 'Email inválido'
                };
                showMessage(errors[error.code] || 'Erro ao cadastrar', 'error');
            }

            registerBtn.textContent = 'Cadastrar';
            registerBtn.disabled = false;
        };

        logoutBtn.onclick = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                authSection.classList.add('hidden');
                userSection.classList.remove('hidden');
                userEmailEl.textContent = user.email;
            } else {
                authSection.classList.remove('hidden');
                userSection.classList.add('hidden');
                emailInput.value = '';
                passwordInput.value = '';
            }
        });
    </script>
</body>
</html>
