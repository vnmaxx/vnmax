<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vnmax</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>vnmax</h1>
            <p>Bem-vindo ao site vnmax</p>
        </header>

        <div id="auth-section">
            <div id="login-form">
                <h2>Login</h2>
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="password" placeholder="Senha" required>
                <button id="login-btn">Entrar</button>
                <button id="register-btn">Cadastrar</button>
                <p id="auth-message"></p>
            </div>
        </div>

        <div id="user-section" class="hidden">
            <h2>Bem-vindo, <span id="user-email"></span>!</h2>
            <button id="logout-btn">Sair</button>
        </div>

        <main id="main-content" class="hidden">
            <h2>Conteúdo do Site</h2>
            <p>Este é o conteúdo principal do site vnmax.</p>
            <p>Você está logado com sucesso!</p>
        </main>
    </div>

    <script type="module">
        // Import the functions you need from the SDKs you need
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDPgiG3xbyo4P3qbLzRqZrlANGxifmwrzw",
            authDomain: "vnmax-6a660.firebaseapp.com",
            projectId: "vnmax-6a660",
            storageBucket: "vnmax-6a660.firebasestorage.app",
            messagingSenderId: "795631747302",
            appId: "1:795631747302:web:bc40546368f9f80c447b27",
            measurementId: "G-NVNP64WTYX"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // DOM Elements
        const loginForm = document.getElementById('login-form');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('login-btn');
        const registerBtn = document.getElementById('register-btn');
        const authMessage = document.getElementById('auth-message');
        const userSection = document.getElementById('user-section');
        const userEmailSpan = document.getElementById('user-email');
        const logoutBtn = document.getElementById('logout-btn');
        const mainContent = document.getElementById('main-content');

        // Login
        loginBtn.addEventListener('click', async () => {
            const email = emailInput.value;
            const password = passwordInput.value;

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                authMessage.textContent = 'Login realizado com sucesso!';
                authMessage.style.color = 'green';
            } catch (error) {
                authMessage.textContent = 'Erro: ' + error.message;
                authMessage.style.color = 'red';
            }
        });

        // Register
        registerBtn.addEventListener('click', async () => {
            const email = emailInput.value;
            const password = passwordInput.value;

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                authMessage.textContent = 'Cadastro realizado com sucesso!';
                authMessage.style.color = 'green';
            } catch (error) {
                authMessage.textContent = 'Erro: ' + error.message;
                authMessage.style.color = 'red';
            }
        });

        // Logout
        logoutBtn.addEventListener('click', async () => {
            try {
                await signOut(auth);
                authMessage.textContent = '';
            } catch (error) {
                authMessage.textContent = 'Erro ao sair: ' + error.message;
            }
        });

        // Auth state observer
        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginForm.classList.add('hidden');
                userSection.classList.remove('hidden');
                mainContent.classList.remove('hidden');
                userEmailSpan.textContent = user.email;
            } else {
                loginForm.classList.remove('hidden');
                userSection.classList.add('hidden');
                mainContent.classList.add('hidden');
                emailInput.value = '';
                passwordInput.value = '';
            }
        });
    </script>
</body>
</html>
