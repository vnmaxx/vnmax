<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vnmax</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-effects">
        <div class="grid"></div>
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
    </div>

    <div class="container">
        <header class="header">
            <h1 class="logo">VNMAX</h1>
            <p class="tagline">Sistema de Autenticação</p>
        </header>

        <div id="auth-section">
            <div class="auth-card">
                <div class="card-header">
                    <div class="icon-container">
                        <svg class="lock-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                    </div>
                    <h2>Acesso Restrito</h2>
                </div>

                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div id="auth-message" class="message"></div>

                <div class="button-group">
                    <button id="login-btn" class="btn btn-primary">
                        <span>Entrar</span>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                            <polyline points="10 17 15 12 10 7"></polyline>
                            <line x1="15" y1="12" x2="3" y2="12"></line>
                        </svg>
                    </button>
                    <button id="register-btn" class="btn btn-secondary">
                        <span>Cadastrar</span>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                            <circle cx="8.5" cy="7" r="4"></circle>
                            <line x1="20" y1="8" x2="20" y2="14"></line>
                            <line x1="23" y1="11" x2="17" y2="11"></line>
                        </svg>
                    </button>
                </div>

                <div class="info-text">
                    <p>⚠️ Apenas usuários cadastrados podem acessar</p>
                </div>
            </div>
        </div>

        <div id="user-section" class="hidden">
            <div class="user-card">
                <div class="user-header">
                    <div class="user-avatar">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                    </div>
                    <div class="user-info">
                        <h2>Usuário Autenticado</h2>
                        <p id="user-email" class="user-email"></p>
                    </div>
                </div>

                <div class="user-content">
                    <h3>Bem-vindo ao Sistema</h3>
                    <p>Você está logado com sucesso no sistema vnmax.</p>
                    <div class="status-badge">
                        <span class="pulse"></span>
                        Online
                    </div>
                </div>

                <button id="logout-btn" class="btn btn-danger">
                    <span>Sair</span>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDPgiG3xbyo4P3qbLzRqZrlANGxifmwrzw",
            authDomain: "vnmax-6a660.firebaseapp.com",
            projectId: "vnmax-6a660",
            storageBucket: "vnmax-6a660.firebasestorage.app",
            messagingSenderId: "795631747302",
            appId: "1:795631747302:web:bc40546368f9f80c447b27",
            measurementId: "G-NVNP64WTYX"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const loginForm = document.getElementById('auth-section');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('login-btn');
        const registerBtn = document.getElementById('register-btn');
        const authMessage = document.getElementById('auth-message');
        const userSection = document.getElementById('user-section');
        const userEmailSpan = document.getElementById('user-email');
        const logoutBtn = document.getElementById('logout-btn');

        function showMessage(text, type) {
            authMessage.textContent = text;
            authMessage.className = `message ${type} show`;
            setTimeout(() => {
                authMessage.className = 'message';
                authMessage.textContent = '';
            }, 4000);
        }

        loginBtn.addEventListener('click', async () => {
            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                showMessage('Preencha todos os campos!', 'error');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.querySelector('span').textContent = 'Verificando...';

            try {
                await signInWithEmailAndPassword(auth, email, password);
                showMessage('Login realizado com sucesso!', 'success');
            } catch (error) {
                const errorMessages = {
                    'auth/user-not-found': 'Usuário não encontrado. Cadastre-se primeiro.',
                    'auth/wrong-password': 'Senha incorreta.',
                    'auth/invalid-email': 'Email inválido.',
                    'auth/too-many-requests': 'Muitas tentativas. Tente novamente mais tarde.',
                    'auth/invalid-credential': 'Credenciais inválidas. Verifique email e senha.'
                };
                showMessage(errorMessages[error.code] || 'Erro ao fazer login. Tente novamente.', 'error');
            }

            loginBtn.disabled = false;
            loginBtn.querySelector('span').textContent = 'Entrar';
        });

        registerBtn.addEventListener('click', async () => {
            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                showMessage('Preencha todos os campos!', 'error');
                return;
            }

            if (password.length < 6) {
                showMessage('A senha deve ter pelo menos 6 caracteres!', 'error');
                return;
            }

            registerBtn.disabled = true;
            registerBtn.querySelector('span').textContent = 'Criando...';

            try {
                await createUserWithEmailAndPassword(auth, email, password);
                showMessage('Usuário cadastrado com sucesso!', 'success');
            } catch (error) {
                const errorMessages = {
                    'auth/email-already-in-use': 'Este email já está cadastrado.',
                    'auth/invalid-email': 'Email inválido.',
                    'auth/weak-password': 'Senha muito fraca.'
                };
                showMessage(errorMessages[error.code] || 'Erro ao cadastrar. Tente novamente.', 'error');
            }

            registerBtn.disabled = false;
            registerBtn.querySelector('span').textContent = 'Cadastrar';
        });

        logoutBtn.addEventListener('click', async () => {
            try {
                await signOut(auth);
            } catch (error) {
                showMessage('Erro ao sair.', 'error');
            }
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginForm.classList.add('hidden');
                userSection.classList.remove('hidden');
                userEmailSpan.textContent = user.email;
            } else {
                loginForm.classList.remove('hidden');
                userSection.classList.add('hidden');
                emailInput.value = '';
                passwordInput.value = '';
                authMessage.textContent = '';
                authMessage.className = 'message';
            }
        });
    </script>
</body>
</html>
